<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DivX AVI Player</title>
<style>
  :root {
    --bg: #0e0f13; --panel: #171a21; --panel2: #1f232c;
    --ink: #e8e9ec; --mut: #8b9099; --acc: #e2b149; --acc2: #f0c674;
    --err: #ff6b6b; --ok: #5ec27a; --line: #2a2f3a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font: 14px/1.4 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  body { display: flex; flex-direction: column; min-height: 100vh; }
  header { display: flex; align-items: center; gap: 14px; padding: 12px 18px;
    background: var(--panel); border-bottom: 1px solid var(--line); min-width: 0; }
  header .logo { width: 30px; height: 30px; border-radius: 7px;
    background: linear-gradient(135deg, var(--acc), #b9842d);
    display: grid; place-items: center; color: #1a1306; font-weight: 800;
    box-shadow: 0 1px 0 rgba(255,255,255,.15) inset; }
  header .titleblock { min-width: 0; }
  header h1 { font-size: 15px; margin: 0; letter-spacing: .3px; }
  header .sub { color: var(--mut); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  header .spacer { flex: 1; }
  header .ver { color: var(--mut); font-size: 11px; }
  main { flex: 1; display: grid; grid-template-columns: 1fr; min-height: 0; }
  .stage { position: relative; background: #000; display: flex; align-items: center;
    justify-content: center; min-height: 0; overflow: hidden; }
  .stage.drag { outline: 1px solid var(--acc); outline-offset: -1px; }
  .stage:fullscreen, .stage:-webkit-full-screen { width: 100vw; height: 100vh; }
  #video { max-width: 100%; max-height: 100%; width: auto; height: auto;
    image-rendering: pixelated; background: #000; display: block; }
  .stage .vframe { position: relative; display: flex; align-items: center;
    justify-content: center; height: 100%; width: 100%; }
  .overlay { position: absolute; inset: 0; display: grid; place-items: center;
    text-align: center; padding: 24px; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,.55), rgba(0,0,0,.85)); }
  .overlay .card { pointer-events: auto; max-width: 460px; }
  .overlay .big { font-size: 15px; color: var(--ink); margin-bottom: 6px; }
  .overlay .hint { color: var(--mut); font-size: 12px; margin-bottom: 14px; }
  .overlay .err { color: var(--err); }
  .overlay code { background: #000; padding: 1px 5px; border-radius: 4px; color: var(--acc2); }
  .btn { appearance: none; border: 1px solid var(--line); background: var(--panel2);
    color: var(--ink); padding: 9px 14px; border-radius: 8px; cursor: pointer;
    font-size: 13px; transition: .12s; }
  .btn:hover { border-color: var(--acc); color: var(--acc2); }
  .btn:disabled { opacity: .45; cursor: default; }
  .btn.primary { background: linear-gradient(180deg, var(--acc), #c8902a);
    color: #1a1306; border-color: transparent; font-weight: 700; }
  .btn.primary:hover { filter: brightness(1.06); color: #1a1306; }
  .overlay-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .info-toggle { position: absolute; top: 14px; right: 14px; z-index: 5; font-size: 16px; font-weight: 700; }
  .info-popover { position: absolute; top: 56px; right: 14px; z-index: 6;
    width: min(320px, calc(100% - 28px)); max-height: calc(100% - 70px);
    overflow: auto; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 14px; }
  .info-popover[hidden] { display: none; }
  .info-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .info-head h2, .info-section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--mut); margin: 4px 0 6px; }
  .info-head h2 { margin: 0; }
  .filebox { border: 1px solid var(--line); border-radius: 10px; padding: 14px;
    display: flex; flex-direction: column; gap: 10px; background: var(--panel2); }
  .meta { font-size: 12px; color: var(--mut); }
  .meta b { color: var(--ink); font-weight: 600; }
  .meta .row { display: flex; justify-content: space-between; gap: 8px; padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,.04); }
  .meta .row:last-child { border-bottom: none; }
  .statusline { font-size: 12px; color: var(--mut); min-height: 16px; }
  .statusline.ok { color: var(--ok); }
  .statusline.err { color: var(--err); }
  footer { background: var(--panel); border-top: 1px solid var(--line); padding: 10px 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: nowrap; min-width: 0; }
  .ctrl { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }
  .icobtn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--line);
    flex: 0 0 34px;
    background: var(--panel2); color: var(--ink); cursor: pointer; display: grid;
    place-items: center; transition: .12s; }
  .icobtn:hover { border-color: var(--acc); color: var(--acc2); }
  .icobtn:disabled { opacity: .4; cursor: default; }
  .icobtn svg { width: 16px; height: 16px; display: block; }
  .scrub { flex: 1 1 auto; min-width: 80px; }
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
    background: var(--panel2); border-radius: 4px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%; background: var(--acc);
    border: 2px solid #1a1306; cursor: pointer; }
  input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%;
    background: var(--acc); border: 2px solid #1a1306; cursor: pointer; }
  .time { font-variant-numeric: tabular-nums; font-size: 12px; color: var(--mut);
    flex: 0 0 44px; text-align: center; }
  .volwrap { display: flex; align-items: center; gap: 6px; flex: 0 0 110px; }
  .volwrap input[type=range] { width: 80px; }
  .kbd { color: var(--mut); font-size: 11px; line-height: 1.7; }
  .kbd kbd { background: var(--panel2); border: 1px solid var(--line); border-radius: 4px;
    padding: 0 5px; font-size: 11px; }
</style>
</head>
<body>
<header>
  <div class="logo">D</div>
  <div class="titleblock">
    <h1>DivX AVI Player</h1>
    <div class="sub">Browser playback for archival DivX&nbsp;5 / MPEG-4 Part&nbsp;2 + MP3 AVI files</div>
  </div>
  <div class="spacer"></div>
  <input type="file" id="fileInput" accept=".avi,video/x-msvideo,video/avi,video/*" hidden>
  <button class="btn" id="demoBtn">Open demo video</button>
  <button class="btn primary" id="openBtn">Open .avi file...</button>
  <div class="ver" id="ver">-</div>
</header>

<main>
  <div class="stage">
    <div class="vframe">
      <canvas id="video" width="640" height="480" hidden></canvas>
      <div class="overlay" id="overlay">
        <div class="card">
          <div class="big" id="ovTitle">Load a decoder to begin</div>
          <div class="hint" id="ovHint">Initializing the WebAssembly DivX decoder...</div>
          <div id="ovActions"></div>
        </div>
      </div>
    </div>

    <button class="icobtn info-toggle" id="infoBtn" title="Info" aria-label="Info" aria-expanded="false" aria-controls="infoPanel">i</button>
    <div class="info-popover" id="infoPanel" hidden>
      <div class="info-head">
        <h2>Info</h2>
        <button class="icobtn" id="infoCloseBtn" title="Close info" aria-label="Close info">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="info-section">
        <h2>Source</h2>
        <div class="filebox">
          <div class="meta" id="fileMeta" style="text-align:center;">No file loaded</div>
        </div>
      </div>
      <div class="info-section">
        <h2>Stream info</h2>
        <div class="meta" id="streamInfo">-</div>
      </div>
      <div class="info-section">
        <h2>Status</h2>
        <div class="statusline" id="status">Idle</div>
      </div>
      <div class="kbd">
        <kbd>Space</kbd> play/pause &nbsp; <kbd>&larr;</kbd>/<kbd>&rarr;</kbd> seek 5s<br>
        <kbd>&uarr;</kbd>/<kbd>&darr;</kbd> volume
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="ctrl">
    <button class="icobtn" id="playBtn" disabled title="Play / Pause (Space)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path id="playIcon" d="M8 5v14l11-7z"/></svg>
    </button>
  </div>
  <div class="time" id="curTime">0:00</div>
  <input type="range" class="scrub" id="seek" min="0" max="1000" value="0" disabled>
  <div class="time" id="durTime">0:00</div>
  <button class="icobtn" id="fullscreenBtn" title="Fullscreen (F)" aria-label="Fullscreen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path id="fullscreenIcon" d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
  </button>
  <div class="volwrap">
    <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px;opacity:.7"><path d="M3 10v4h4l5 5V5L7 10H3z"/></svg>
    <input type="range" id="vol" min="0" max="1" step="0.01" value="1">
  </div>
</footer>

<script type="module">
import { createAviPlayer } from "./src/avi-player.js";

const LIBAV_JS = "lib/libav-6.8.8.0-divx-mp3-avi.js";
const DEMO_VIDEO_URL = "demo_bigbuckbunny.avi";

const $ = (id) => document.getElementById(id);
const dom = {
  stage: document.querySelector(".stage"),
  canvas: $("video"), overlay: $("overlay"),
  ovTitle: $("ovTitle"), ovHint: $("ovHint"), ovActions: $("ovActions"),
  openBtn: $("openBtn"), demoBtn: $("demoBtn"), fileInput: $("fileInput"),
  infoBtn: $("infoBtn"), infoPanel: $("infoPanel"), infoCloseBtn: $("infoCloseBtn"),
  fileMeta: $("fileMeta"), streamInfo: $("streamInfo"), status: $("status"), ver: $("ver"),
  playBtn: $("playBtn"), playIcon: $("playIcon"),
  fullscreenBtn: $("fullscreenBtn"), fullscreenIcon: $("fullscreenIcon"),
  seek: $("seek"), curTime: $("curTime"), durTime: $("durTime"), vol: $("vol"),
};

const player = createAviPlayer({
  canvas: dom.canvas,
  libavUrl: LIBAV_JS,
  volume: parseFloat(dom.vol.value),
  onStatus: setStatus,
  onMetadata: renderMetadata,
  onTimeUpdate: renderTime,
  onEnded: () => setPlayIcon(false),
  onError: (error) => {
    console.error(error);
    setStatus("Error: " + (error.message || error), "err");
  },
});

function setStatus(text, cls) {
  dom.status.className = "statusline" + (cls ? " " + cls : "");
  dom.status.textContent = text;
}

function showOverlay(title, hint, actionsHtml = "", hintCls = "") {
  dom.overlay.style.display = "grid";
  dom.ovTitle.textContent = title;
  dom.ovHint.innerHTML = hint;
  dom.ovHint.className = "hint" + (hintCls ? " " + hintCls : "");
  dom.ovActions.innerHTML = actionsHtml;
}

function hideOverlay() {
  dom.overlay.style.display = "none";
}

function setInfoOpen(open) {
  dom.infoPanel.hidden = !open;
  dom.infoBtn.setAttribute("aria-expanded", open ? "true" : "false");
}

function fmtTime(seconds) {
  let value = seconds;
  if (!isFinite(value) || value < 0) value = 0;
  value = Math.floor(value);
  const h = Math.floor(value / 3600);
  const m = Math.floor((value % 3600) / 60);
  const sec = value % 60;
  const mm = String(m).padStart(h ? 2 : 1, "0");
  const ss = String(sec).padStart(2, "0");
  return h ? `${h}:${mm}:${ss}` : `${m}:${ss}`;
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
}

function renderMetadata(state) {
  dom.streamInfo.innerHTML = `
    <div class="row"><span>Container</span><b>AVI</b></div>
    <div class="row"><span>Video</span><b>DivX / MPEG-4 Pt.2</b></div>
    <div class="row"><span>Resolution</span><b>${state.width}x${state.height}</b></div>
    <div class="row"><span>Frame rate</span><b>${state.fps ? state.fps.toFixed(3) : "-"} fps</b></div>
    <div class="row"><span>Audio</span><b>${state.hasAudio ? `MP3 / ${state.sampleRate} Hz` : "none"}</b></div>
    <div class="row"><span>Duration</span><b>${fmtTime(state.duration)}</b></div>
  `;
  dom.seek.disabled = false;
  dom.playBtn.disabled = false;
  dom.durTime.textContent = fmtTime(state.duration);
  dom.curTime.textContent = "0:00";
  dom.seek.value = 0;
  dom.canvas.hidden = false;
  hideOverlay();
}

function renderTime(state) {
  if (dom.seek.disabled) return;
  if (!dom.seek.matches(":active")) {
    dom.curTime.textContent = fmtTime(state.currentTime);
    if (!dragging && state.duration > 0) {
      dom.seek.value = Math.min(1000, Math.max(0, (state.currentTime / state.duration) * 1000));
    }
  }
}

function setPlayIcon(isPlaying) {
  dom.playIcon.setAttribute("d", isPlaying ? "M6 5h4v14H6zM14 5h4v14h-4z" : "M8 5v14l11-7z");
}

function isStageFullscreen() {
  return document.fullscreenElement === dom.stage || document.webkitFullscreenElement === dom.stage;
}

function updateFullscreenIcon() {
  const active = isStageFullscreen();
  dom.fullscreenIcon.setAttribute("d", active
    ? "M8 3v3a2 2 0 0 1-2 2H3M16 3v3a2 2 0 0 0 2 2h3M8 21v-3a2 2 0 0 0-2-2H3M16 21v-3a2 2 0 0 1 2-2h3"
    : "M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3");
  dom.fullscreenBtn.title = active ? "Exit fullscreen (F)" : "Fullscreen (F)";
  dom.fullscreenBtn.setAttribute("aria-label", active ? "Exit fullscreen" : "Fullscreen");
}

async function toggleFullscreen() {
  try {
    if (isStageFullscreen()) {
      if (document.exitFullscreen) await document.exitFullscreen();
      else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
    } else if (dom.stage.requestFullscreen) {
      await dom.stage.requestFullscreen();
    } else if (dom.stage.webkitRequestFullscreen) {
      await dom.stage.webkitRequestFullscreen();
    }
  } catch (error) {
    setStatus("Fullscreen failed: " + (error.message || error), "err");
  }
}

async function openFile(file) {
  dom.fileMeta.innerHTML = `<b>${escapeHtml(file.name)}</b><br>${(file.size / 1048576).toFixed(1)} MB`;
  showOverlay("Opening", `Reading <b>${escapeHtml(file.name)}</b> into the decoder...`);
  dom.playBtn.disabled = true;
  dom.seek.disabled = true;
  setPlayIcon(false);
  try {
    await player.open(file, file.name);
    await player.play();
    setPlayIcon(true);
  } catch (error) {
    showOverlay(
      "Could not open this file",
      `${escapeHtml(error.message || String(error))}<br><br>Supported: AVI with DivX/Xvid (MPEG-4 Part 2) video and MP3 audio.`,
      "",
      "err",
    );
    setPlayIcon(false);
  }
}

async function openDemoVideo() {
  const demoName = DEMO_VIDEO_URL.split("/").pop() || "demo.avi";
  dom.demoBtn.disabled = true;
  showOverlay("Opening demo", `Downloading <b>${escapeHtml(demoName)}</b>...`);
  try {
    const response = await fetch(DEMO_VIDEO_URL);
    if (!response.ok) throw new Error(`Demo video unavailable (${response.status})`);
    const blob = await response.blob();
    const demoFile = typeof File === "function"
      ? new File([blob], demoName, { type: blob.type || "video/x-msvideo" })
      : Object.assign(blob, { name: demoName });
    await openFile(demoFile);
  } catch (error) {
    const message = error.message || String(error);
    setStatus("Demo load failed: " + message, "err");
    showOverlay(
      "Could not open demo video",
      `${escapeHtml(message)}<br><br>Serve over HTTP with <code>server.cmd</code>; browser file mode cannot fetch the demo asset.`,
      "",
      "err",
    );
  } finally {
    dom.demoBtn.disabled = false;
  }
}

async function togglePlay() {
  await player.toggle();
  setPlayIcon(player.getState().playing);
}

function seekToRatio(ratio) {
  const state = player.getState();
  if (!state.loaded) return;
  const basis = state.duration || state.currentTime;
  player.seek(Math.max(0, Math.min(1, ratio)) * basis);
}

showOverlay("Loading DivX decoder", "Downloading / compiling the WebAssembly core...");
player.init()
  .then(() => {
    dom.ver.textContent = "libav.js / divx-mp3-avi";
    showOverlay("Ready", "Open the bundled demo video, choose an AVI file, or drag and drop one onto the video area.",
      `<div class="overlay-actions"><button class="btn" data-open-demo>Open demo video</button><button class="btn primary" data-open-file>Open .avi file...</button></div>`);
  })
  .catch((error) => {
    console.error(error);
    showOverlay("Decoder failed to load",
      `${escapeHtml(error.message)}<br><br>Expected file: <code>${LIBAV_JS}</code> plus its <code>.wasm.js</code> / <code>.wasm.wasm</code> siblings. ` +
      `Serve over HTTP with <code>server.cmd</code>; do not open this HTML directly (file://).`,
      "",
      "err",
    );
  });

let dragging = false;

dom.ovActions.addEventListener("click", (event) => {
  if (event.target.closest("[data-open-demo]")) openDemoVideo();
  if (event.target.closest("[data-open-file]")) dom.fileInput.click();
});
dom.demoBtn.addEventListener("click", openDemoVideo);
dom.openBtn.addEventListener("click", () => dom.fileInput.click());
dom.fileInput.addEventListener("change", () => { if (dom.fileInput.files[0]) openFile(dom.fileInput.files[0]); });
dom.infoBtn.addEventListener("click", () => setInfoOpen(dom.infoPanel.hidden));
dom.infoCloseBtn.addEventListener("click", () => setInfoOpen(false));
dom.stage.addEventListener("click", (event) => {
  if (dom.infoPanel.hidden || dom.infoPanel.contains(event.target) || dom.infoBtn.contains(event.target)) return;
  setInfoOpen(false);
});
dom.stage.addEventListener("dragover", (event) => { event.preventDefault(); dom.stage.classList.add("drag"); });
dom.stage.addEventListener("dragleave", () => dom.stage.classList.remove("drag"));
dom.stage.addEventListener("drop", (event) => {
  event.preventDefault();
  dom.stage.classList.remove("drag");
  const file = event.dataTransfer.files[0];
  if (file) openFile(file);
});
dom.playBtn.addEventListener("click", togglePlay);
dom.fullscreenBtn.addEventListener("click", toggleFullscreen);
document.addEventListener("fullscreenchange", updateFullscreenIcon);
document.addEventListener("webkitfullscreenchange", updateFullscreenIcon);
dom.vol.addEventListener("input", () => player.setVolume(parseFloat(dom.vol.value)));
dom.seek.addEventListener("pointerdown", () => { dragging = true; });
dom.seek.addEventListener("pointerup", () => { dragging = false; });
dom.seek.addEventListener("input", () => {
  const state = player.getState();
  if (!state.duration) return;
  dom.curTime.textContent = fmtTime((dom.seek.value / 1000) * state.duration);
});
dom.seek.addEventListener("change", () => {
  const state = player.getState();
  if (state.duration) player.seek((dom.seek.value / 1000) * state.duration);
});
document.addEventListener("keydown", (event) => {
  if (event.target.tagName === "INPUT" && event.code !== "KeyF") return;
  const state = player.getState();
  if (event.code === "Escape" && !dom.infoPanel.hidden) {
    event.preventDefault();
    setInfoOpen(false);
  } else if (event.code === "Space") {
    event.preventDefault();
    togglePlay();
  } else if (event.code === "ArrowRight") {
    seekToRatio((state.currentTime + 5) / (state.duration || 1));
  } else if (event.code === "ArrowLeft") {
    seekToRatio((state.currentTime - 5) / (state.duration || 1));
  } else if (event.code === "ArrowUp") {
    dom.vol.value = Math.min(1, parseFloat(dom.vol.value) + 0.05);
    dom.vol.dispatchEvent(new Event("input"));
  } else if (event.code === "ArrowDown") {
    dom.vol.value = Math.max(0, parseFloat(dom.vol.value) - 0.05);
    dom.vol.dispatchEvent(new Event("input"));
  } else if (event.code === "KeyF" && !event.ctrlKey && !event.metaKey && !event.altKey) {
    event.preventDefault();
    toggleFullscreen();
  }
});

if (!document.fullscreenEnabled && !document.webkitFullscreenEnabled) {
  dom.fullscreenBtn.disabled = true;
}
updateFullscreenIcon();
</script>
</body>
</html>
